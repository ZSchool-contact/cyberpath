<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberPath — קורס סייבר</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050d18;
    --bg2: #0a1628;
    --bg3: #0f1f3a;
    --accent: #00e5ff;
    --accent2: #7b2fff;
    --green: #00ff9d;
    --red: #ff3b5c;
    --text: #cdd9f0;
    --text-dim: #5a7a9a;
    --border: rgba(0,229,255,0.12);
    --card: rgba(10,22,40,0.85);
    --glow: 0 0 24px rgba(0,229,255,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GLOW ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 500px; height: 500px; background: rgba(0,229,255,0.06); top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(123,47,255,0.07); bottom: -100px; right: -100px; }

  /* ── SCREEN SYSTEM ── */
  .screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ════════════════════════════
     AUTH SCREEN
  ════════════════════════════ */
  #auth-screen {
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .auth-box {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    backdrop-filter: blur(20px);
    box-shadow: var(--glow), 0 40px 80px rgba(0,0,0,0.5);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 2rem;
  }

  .auth-logo .logo-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .auth-logo h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  .auth-logo p {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }

  .tab-row {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 1.8rem;
    border: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 0.6rem;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--bg3);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,229,255,0.15);
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  .form-group label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: ltr;
    text-align: left;
  }

  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,229,255,0.15);
  }

  .btn-primary {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #050d18;
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,229,255,0.3);
  }

  .error-msg {
    background: rgba(255,59,92,0.1);
    border: 1px solid rgba(255,59,92,0.3);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    font-size: 0.82rem;
    color: var(--red);
    margin-bottom: 1rem;
    display: none;
  }

  /* ════════════════════════════
     DASHBOARD SCREEN
  ════════════════════════════ */
  #dashboard-screen {
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(5,13,24,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .user-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--bg);
  }

  .user-name {
    font-size: 0.9rem;
    color: var(--text);
  }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Heebo', sans-serif;
    font-size: 0.8rem;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* ── MAIN CONTENT ── */
  .dashboard-main {
    flex: 1;
    padding: 2rem 2rem 4rem;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── WELCOME HERO ── */
  .welcome-hero {
    margin-bottom: 2.5rem;
    animation: fadeUp 0.5s ease;
  }

  .welcome-hero .greeting {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    opacity: 0.8;
  }

  .welcome-hero h2 {
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .welcome-hero p {
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    backdrop-filter: blur(10px);
  }

  .stat-card .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }

  .stat-card .stat-value {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
  }

  .stat-card .stat-sub {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 0.2rem;
  }

  /* ── PROGRESS BAR ── */
  .progress-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2.5rem;
    backdrop-filter: blur(10px);
    animation: fadeUp 0.5s ease 0.15s both;
  }

  .progress-section h3 {
    font-size: 0.85rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 1rem;
  }

  .progress-bar-wrap {
    background: var(--bg);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 1s ease;
    box-shadow: 0 0 12px rgba(0,229,255,0.4);
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  /* ── UNITS SECTION ── */
  .units-section {
    animation: fadeUp 0.5s ease 0.2s both;
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    margin-right: 0.5rem;
  }

  .units-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.2rem;
  }

  .unit-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4rem;
    backdrop-filter: blur(10px);
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .unit-card::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .unit-card:hover {
    border-color: rgba(0,229,255,0.3);
    transform: translateY(-2px);
    box-shadow: var(--glow);
  }

  .unit-card:hover::before { opacity: 1; }

  .unit-card.locked {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .unit-card.locked:hover {
    transform: none;
    box-shadow: none;
  }

  .unit-card.completed {
    border-color: rgba(0,255,157,0.2);
  }

  .unit-card.completed::before {
    background: var(--green);
    opacity: 1;
  }

  .unit-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  .unit-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .unit-badge {
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  .badge-done { background: rgba(0,255,157,0.12); color: var(--green); border: 1px solid rgba(0,255,157,0.2); }
  .badge-active { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }
  .badge-locked { background: rgba(90,122,154,0.1); color: var(--text-dim); border: 1px solid rgba(90,122,154,0.2); }
  .badge-soon { background: rgba(123,47,255,0.1); color: var(--accent2); border: 1px solid rgba(123,47,255,0.2); }

  .unit-title {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.4rem;
    line-height: 1.3;
  }

  .unit-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 1rem;
  }

  .unit-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .unit-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .unit-arrow {
    font-size: 0.85rem;
    color: var(--accent);
    transition: transform 0.2s;
  }

  .unit-card:hover .unit-arrow { transform: translateX(-4px); }

  /* ════════════════════════════
     RESPONSIVE
  ════════════════════════════ */
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stats-row .stat-card:last-child { grid-column: span 2; }
    .dashboard-main { padding: 1.2rem; }
    .welcome-hero h2 { font-size: 1.5rem; }
    .topbar { padding: 0.8rem 1rem; }
  }

  /* ── BLINKING CURSOR ── */
  .cursor::after {
    content: '_';
    animation: blink 1s step-end infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- ════ AUTH SCREEN ════ -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">🛡️</div>
      <h1>CYBERPATH</h1>
      <p>קורס סייבר ורשתות לבני נוער</p>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">התחברות</button>
      <button class="tab-btn" onclick="switchTab('register')">הרשמה</button>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label>// שם משתמש</label>
        <input type="text" id="login-user" placeholder="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>// סיסמה</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="handleLogin()">התחבר ←</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>// שם פרטי</label>
        <input type="text" id="reg-name" placeholder="השם שיוצג בפרופיל שלך">
      </div>
      <div class="form-group">
        <label>// שם משתמש</label>
        <input type="text" id="reg-user" placeholder="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>// סיסמה</label>
        <input type="password" id="reg-pass" placeholder="בחר סיסמה חזקה" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="handleRegister()">הרשם וצא לדרך ←</button>
    </div>
  </div>
</div>

<!-- ════ DASHBOARD SCREEN ════ -->
<div id="dashboard-screen" class="screen">

  <nav class="topbar">
    <span class="topbar-logo" style="display:flex;align-items:center;gap:10px;">
      <img src="assets/zschool-logo.png" alt="Z-School" style="height:34px;width:auto;mix-blend-mode:screen;">
      CYBERPATH
    </span>
    <div class="topbar-user">
      <div class="user-avatar" id="avatar-initials">?</div>
      <span class="user-name" id="display-name">—</span>
      <button class="logout-btn" onclick="handleLogout()">יציאה</button>
    </div>
  </nav>

  <main class="dashboard-main">

    <div class="welcome-hero">
      <div class="greeting">// ברוך הבא לפאנל הקורס</div>
      <h2>שלום, <span id="hero-name" class="cursor">—</span></h2>
      <p>כל יחידה היא שלב בדרך להפוך לאיש מקצוע בסייבר.</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">// יחידות הושלמו</div>
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-sub">מתוך 6 יחידות</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">// נקודות שנצברו</div>
        <div class="stat-value" id="stat-points">0</div>
        <div class="stat-sub">XP</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">// רמה נוכחית</div>
        <div class="stat-value" id="stat-level">1</div>
        <div class="stat-sub" id="stat-level-label">Rookie</div>
      </div>
    </div>

    <div class="progress-section">
      <h3>// התקדמות בקורס</h3>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-labels">
        <span id="progress-pct">0% הושלם</span>
        <span id="progress-next">יחידה הבאה: יחידה 1</span>
      </div>
    </div>

    <div class="units-section">
      <div class="section-title">יחידות הקורס</div>
      <div class="units-grid" id="units-grid">
        <!-- rendered by JS -->
      </div>
    </div>

  </main>
</div>

  { min: 300, label: "Net Explorer" },
  { min: 600, label: "Packet Watcher" },
  { min: 900, label: "Cyber Analyst" },
  { min: 1200, label: "Elite Hacker" }
];

// ══════════════════════════════
//  STORAGE HELPERS
// ══════════════════════════════
function getUsers() {
  return JSON.parse(localStorage.getItem('cp_users') || '{}');
}
function saveUsers(u) {
  localStorage.setItem('cp_users', JSON.stringify(u));
}
function getCurrentUser() {
  return localStorage.getItem('cp_current');
}
function setCurrentUser(u) {
  localStorage.setItem('cp_current', u);
}
function getUserData(username) {
  const users = getUsers();
  return users[username] || null;
}
function saveUserData(username, data) {
  const users = getUsers();
  users[username] = data;
  saveUsers(users);
}

// ══════════════════════════════
//  AUTH
// ══════════════════════════════
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('error-msg').style.display = 'none';
}

function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const user = document.getElementById('reg-user').value.trim().toLowerCase();
  const pass = document.getElementById('reg-pass').value;

  if (!name || !user || !pass) return showError('יש למלא את כל השדות');
  if (pass.length < 6) return showError('הסיסמה חייבת לכלול לפחות 6 תווים');

  const users = getUsers();
  if (users[user]) return showError('שם המשתמש כבר קיים');

  users[user] = {
    name,
    password: pass,
    completedUnits: [],
    xp: 0,
    joinedAt: new Date().toISOString()
  };
  saveUsers(users);
  setCurrentUser(user);
  loadDashboard(user);
}

function handleLogin() {
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;

  if (!user || !pass) return showError('יש למלא שם משתמש וסיסמה');

  const data = getUserData(user);
  if (!data || data.password !== pass) return showError('שם משתמש או סיסמה שגויים');

  setCurrentUser(user);
  loadDashboard(user);
}

function handleLogout() {
  localStorage.removeItem('cp_current');
  document.getElementById('auth-screen').classList.add('active');
  document.getElementById('dashboard-screen').classList.remove('active');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

// ══════════════════════════════
//  DASHBOARD
// ══════════════════════════════
function loadDashboard(username) {
  const data = getUserData(username);
  const completed = data.completedUnits || [];

  // switch screens
  document.getElementById('auth-screen').classList.remove('active');
  document.getElementById('dashboard-screen').classList.add('active');

  // user info
  const initials = data.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  document.getElementById('avatar-initials').textContent = initials;
  document.getElementById('display-name').textContent = data.name;
  document.getElementById('hero-name').textContent = data.name.split(' ')[0];

  // stats
  const xp = data.xp || 0;
  const level = LEVELS.filter(l => xp >= l.min).pop();
  document.getElementById('stat-done').textContent = completed.length;
  document.getElementById('stat-points').textContent = xp;
  document.getElementById('stat-level').textContent = LEVELS.indexOf(level) + 1;
  document.getElementById('stat-level-label').textContent = level.label;

  // progress
  const pct = Math.round((completed.length / UNITS.length) * 100);
  setTimeout(() => {
    document.getElementById('progress-fill').style.width = pct + '%';
  }, 100);
  document.getElementById('progress-pct').textContent = pct + '% הושלם';

  const nextUnit = UNITS.find(u => !completed.includes(u.id));
  document.getElementById('progress-next').textContent = nextUnit
    ? 'הבא: ' + nextUnit.title.split('—')[0].trim()
    : '✓ כל היחידות הושלמו!';

  // render units
  renderUnits(completed);
}

function renderUnits(completed) {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';

  UNITS.forEach((unit, i) => {
    const isDone = completed.includes(unit.id);
    const isSoon = !unit.available;
    const isActive = !isDone && !isSoon && (i === 0 || completed.includes(UNITS[i - 1]?.id));
    const isLocked = !isDone && !isActive && !isSoon;

    const card = document.createElement('div');
    card.className = 'unit-card' + (isDone ? ' completed' : '') + (isLocked || isSoon ? ' locked' : '');

    const badge = isDone
      ? '<span class="unit-badge badge-done">✓ הושלם</span>'
      : isSoon
        ? '<span class="unit-badge badge-soon">🔜 בקרוב</span>'
        : isActive
          ? '<span class="unit-badge badge-active">● פתוח</span>'
          : '<span class="unit-badge badge-locked">🔒 נעול</span>';

    card.innerHTML = `
      <div class="unit-header">
        <div class="unit-num">// יחידה ${unit.id}</div>
        ${badge}
      </div>
      <div class="unit-title">${unit.title}</div>
      <div class="unit-desc">${unit.desc}</div>
      <div class="unit-footer">
        <span class="unit-meta">${unit.lessons} שיעורים · ${unit.xp} XP</span>
        ${isActive || isDone ? '<span class="unit-arrow">←</span>' : ''}
      </div>
    `;

    if (isActive || isDone) {
      card.onclick = () => openUnit(unit);
    }

    grid.appendChild(card);
  });
}

function openUnit(unit) {
  var match = unit.file.match(/units\/(unit-\d+)\//);
  if (match) window.location.href = '/units/' + match[1];
}

// ══════════════════════════════
//  AUTO-LOGIN
// ══════════════════════════════
const savedUser = getCurrentUser();
if (savedUser && getUserData(savedUser)) {
  loadDashboard(savedUser);
}
</script>
</body>
</html>
